name: Build Android APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install Project Dependencies
        run: yarn install --network-timeout 1000000

      - name: Create Dummy google-services.json
        run: |
          cat <<EOF > android/app/google-services.json
          {
            "project_info": { "project_number": "123456789", "project_id": "dummy-project" },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789:android:abcdef",
                  "android_client_info": { "package_name": "com.pocketpalai" }
                },
                "api_key": [ { "current_key": "DUMMY_KEY_123" } ]
              },
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789:android:abcdef2",
                  "android_client_info": { "package_name": "com.pocketpalai.e2e" }
                },
                "api_key": [ { "current_key": "DUMMY_KEY_123" } ]
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: My-Own-AI-Engine
          path: android/app/build/outputs/apk/**/*.apk
